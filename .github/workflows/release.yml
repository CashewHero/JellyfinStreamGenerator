name: Build & Release Plugin

on:
  push:
    branches:
      - master
      - test
    tags:
      - 'v*'
    paths:
      - 'Jellyfin.Plugin.StreamGenerator/**'
      - 'build.yaml'
      - '.github/workflows/**'
  pull_request:
    branches:
      - master
    paths:
      - 'Jellyfin.Plugin.StreamGenerator/**'
      - 'build.yaml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MinVer CLI
        run: dotnet tool install --global minver-cli

      - name: Resolve version
        id: version
        run: |
          SEMVER=$(minver -t v -p preview -v error)
          echo "semver=${SEMVER}" >> $GITHUB_OUTPUT

          # Convert SemVer to JPRM-compatible 4-part version (x.y.z.build)
          BASE=$(echo "$SEMVER" | sed 's/-.*//')
          PRERELEASE=$(echo "$SEMVER" | grep -oP '(?<=\.)\d+$' || true)
          if echo "$SEMVER" | grep -q '-'; then
            JPRM_VERSION="${BASE}.${PRERELEASE:-0}"
          else
            JPRM_VERSION="${BASE}.0"
          fi
          echo "version=${JPRM_VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved: semver=${SEMVER}, jprm=${JPRM_VERSION}"

      - name: Build Jellyfin Plugin
        uses: oddstr13/jellyfin-plugin-repository-manager@v1.1.1
        id: jprm
        with:
          dotnet-target: net9.0
          version: ${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          retention-days: 30
          if-no-files-found: error
          path: ${{ steps.jprm.outputs.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      release_body: ${{ steps.create_release.outputs.body || steps.release_notes.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./release-assets

      - name: Generate release notes for preview
        id: release_notes
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          BODY=$(git log -1 --pretty=format:"%B")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.semver }}
          files: ./release-assets/*
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          body: ${{ steps.release_notes.outputs.body || '' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}

  publish-manifest:
    needs: [build, release]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./release-assets

      - name: Build manifest
        env:
          CHANGELOG: ${{ needs.release.outputs.release_body }}
        run: |
          mkdir -p pages
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          # Download existing manifest from Pages (if exists)
          curl -sSfL "${PAGES_URL}/manifest.json" -o pages/manifest.json || echo '[]' > pages/manifest.json

          # Determine zip filename and compute checksum
          ZIP_FILE=$(ls ./release-assets/*.zip | head -1)
          ZIP_NAME=$(basename "$ZIP_FILE")
          CHECKSUM=$(md5sum "$ZIP_FILE" | awk '{print $1}')
          VERSION="${{ needs.build.outputs.version }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/v${{ needs.build.outputs.semver }}/${ZIP_NAME}"

          # Read a top-level scalar from build.yaml, trimming whitespace and surrounding
          # quotes. Using awk '{print $2}' breaks on quoted multi-word values such as
          # name: "Stream Generator" (it would yield just "Stream").
          yaml_get() { grep "^$1:" build.yaml | head -1 | sed -E "s/^$1:[[:space:]]*//; s/^\"//; s/\"$//"; }

          GUID=$(yaml_get guid)
          NAME=$(yaml_get name)
          DESCRIPTION=$(yaml_get overview)
          OVERVIEW="$DESCRIPTION"
          OWNER=$(yaml_get owner)
          CATEGORY=$(yaml_get category)
          TARGET_ABI=$(yaml_get targetAbi)

          # Build new version entry with changelog from release notes
          NEW_VERSION=$(jq -n \
            --arg ver "$VERSION" \
            --arg changelog "$CHANGELOG" \
            --arg targetAbi "$TARGET_ABI" \
            --arg sourceUrl "$SOURCE_URL" \
            --arg checksum "$CHECKSUM" \
            --arg timestamp "$TIMESTAMP" \
            '{version: $ver, changelog: $changelog, targetAbi: $targetAbi, sourceUrl: $sourceUrl, checksum: $checksum, timestamp: $timestamp}')

          # Update or create plugin entry in manifest
          PLUGIN_EXISTS=$(jq --arg guid "$GUID" 'map(select(.guid == $guid)) | length' pages/manifest.json)

          if [ "$PLUGIN_EXISTS" -gt "0" ]; then
            # Refresh metadata from build.yaml and append the new version, so changes to
            # name/owner/etc. propagate to an already-published manifest entry.
            jq --arg guid "$GUID" --arg name "$NAME" --arg description "$DESCRIPTION" \
              --arg overview "$OVERVIEW" --arg owner "$OWNER" --arg category "$CATEGORY" \
              --argjson newver "$NEW_VERSION" \
              'map(if .guid == $guid then
                  .name = $name | .description = $description | .overview = $overview |
                  .owner = $owner | .category = $category | .versions += [$newver]
                else . end)' \
              pages/manifest.json > pages/manifest_tmp.json
          else
            # Create new plugin entry
            jq --arg guid "$GUID" --arg name "$NAME" --arg description "$DESCRIPTION" \
              --arg overview "$OVERVIEW" --arg owner "$OWNER" --arg category "$CATEGORY" \
              --argjson newver "$NEW_VERSION" \
              '. += [{"guid": $guid, "name": $name, "description": $description, "overview": $overview, "owner": $owner, "category": $category, "versions": [$newver]}]' \
              pages/manifest.json > pages/manifest_tmp.json
          fi

          mv pages/manifest_tmp.json pages/manifest.json
          echo "Final manifest:"
          cat pages/manifest.json

      # Post-processingon on pages/manifest.json produced by previous step. Kept as separate step so no line-overlap with upstream to stay merge-clean.
      # Prune dead releases, Prune dead releases, Cap history to 10 per channel.
      - name: Normalize manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Collect every valid release-asset download URL for this repo. The manifest
          # is self-referential (rebuilt from its published copy each run), so without
          # this a version stays advertised forever even after its GitHub Release is
          # deleted, leaving a dead sourceUrl that breaks client installs.
          if gh api "repos/${{ github.repository }}/releases" \
               --paginate --jq '.[].assets[].browser_download_url' > valid_urls.txt 2>/dev/null; then
            PRUNE=1
          else
            echo "WARNING: could not fetch release list; skipping dead-release pruning."
            : > valid_urls.txt
            PRUNE=0
          fi
          jq -Rs 'split("\n") | map(select(length > 0))' valid_urls.txt > valid_urls.json

          # Per plugin: drop versions whose release no longer exists, collapse duplicate
          # version strings (keeping the most recent), then keep only the 10 newest builds
          # per channel. With the x.y.z.build version scheme a tagged stable release has
          # build component 0, while a prerelease has build > 0 -- so grouping on
          # "build == 0" keeps stable and prerelease histories capped independently
          # (10 previews can't evict your stable releases).
          jq --argjson validUrls "$(cat valid_urls.json)" --argjson prune "$PRUNE" '
            def vkey: (.version | split(".") | map(tonumber));
            def channel: if (.version | split(".") | .[3] // "0") == "0" then "stable" else "prerelease" end;
            map(
              .versions = (
                .versions
                | (if $prune == 1 then map(select(.sourceUrl as $u | $validUrls | index($u))) else . end)
                | (reduce .[] as $v ({}; .[$v.version] = $v) | [ .[] ])
                | group_by(channel)
                | (map(sort_by(vkey) | reverse | .[0:10]) | add // [])
                | sort_by(vkey) | reverse
              )
            )
            | map(select(.versions | length > 0))
          ' pages/manifest.json > pages/manifest_norm.json
          mv pages/manifest_norm.json pages/manifest.json

          echo "Normalized manifest:"
          cat pages/manifest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
