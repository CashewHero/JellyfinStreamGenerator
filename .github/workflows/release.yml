name: Build & Release Plugin

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MinVer CLI
        run: dotnet tool install --global minver-cli

      - name: Resolve version
        id: version
        run: |
          SEMVER=$(minver -t v -p preview -v error)
          echo "semver=${SEMVER}" >> $GITHUB_OUTPUT

          # Convert SemVer to JPRM-compatible 4-part version (x.y.z.build)
          # e.g. "0.1.1-preview.2" -> "0.1.1.2", "1.0.0" -> "1.0.0.0"
          BASE=$(echo "$SEMVER" | sed 's/-.*//')
          PRERELEASE=$(echo "$SEMVER" | grep -oP '(?<=\.)\d+$' || true)
          if echo "$SEMVER" | grep -q '-'; then
            JPRM_VERSION="${BASE}.${PRERELEASE:-0}"
          else
            JPRM_VERSION="${BASE}.0"
          fi
          echo "version=${JPRM_VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved: semver=${SEMVER}, jprm=${JPRM_VERSION}"

      - name: Build Jellyfin Plugin
        uses: oddstr13/jellyfin-plugin-repository-manager@v1.1.1
        id: jprm
        with:
          dotnet-target: net9.0
          version: ${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          retention-days: 30
          if-no-files-found: error
          path: ${{ steps.jprm.outputs.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./release-assets

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          generate_release_notes: true

  publish-manifest:
    needs: [build, release]
    if: github.event_name != 'pull_request' && always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./release-assets

      - name: Install JPRM
        run: pip install jprm

      - name: Build manifest
        run: |
          mkdir -p pages

          # Download existing manifest from Pages (if exists)
          curl -sSfL "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/manifest.json" -o pages/manifest.json || echo '[]' > pages/manifest.json

          # Add new version to manifest
          for zip in ./release-assets/*.zip; do
            jprm --verbosity=debug repo add --url="https://github.com/${{ github.repository }}/releases/download/v${{ needs.build.outputs.semver }}" pages "$zip"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
